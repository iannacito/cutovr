{% extends "_base.html" %}
{% block title %}Reset password &mdash; {{ app_name }}{% endblock %}
{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <p class="eyebrow">Choose a new password</p>
    <h1 class="display">Reset <em>password</em>.</h1>
    <p class="lede">Enter a new password (at least 12 characters). After you save it, you'll be asked to sign in.</p>

    <article class="card">
      <form method="post" class="stack-sm" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-grid">
          <label class="pwd-field">
            <span>New password (12+ chars)</span>
            <input type="password" name="password" minlength="12" required autofocus autocomplete="new-password">
            <button type="button" class="pwd-toggle"
                    data-password-toggle
                    data-password-toggle-target="password"
                    aria-label="Show password" aria-pressed="false"
                    data-testid="reset-password-toggle">
              <span class="pwd-toggle-text" aria-hidden="true">Show</span>
            </button>
          </label>
          <label class="pwd-field">
            <span>Confirm new password</span>
            <input type="password" name="confirm_password" minlength="12" required autocomplete="new-password">
            <button type="button" class="pwd-toggle"
                    data-password-toggle
                    data-password-toggle-target="confirm_password"
                    aria-label="Show password" aria-pressed="false"
                    data-testid="reset-confirm-password-toggle">
              <span class="pwd-toggle-text" aria-hidden="true">Show</span>
            </button>
          </label>
        </div>
        <button class="btn btn-primary full-width" type="submit" style="margin-top:.5rem;">Save new password</button>
      </form>
    </article>

    <p class="auth-aside"><a href="{{ url_for('login') }}">Back to sign in</a></p>
  </div>
</section>
{% endblock %}
