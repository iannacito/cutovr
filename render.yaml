# Render blueprint for pclaw-qbo-v2.
# Deploy at https://render.com/ -> New -> Blueprint -> point at the repo.
#
# IMPORTANT: do NOT commit secrets. Set the *_FROM_DASHBOARD env vars in the
# Render dashboard after the service is created (Settings -> Environment).

services:
  - type: web
    name: pclaw-qbo
    runtime: python
    plan: starter           # paid tier required for the persistent disk below
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -k gthread --threads 4 --timeout 120 -b 0.0.0.0:$PORT app:app
    autoDeploy: false
    envVars:
      - key: QBO_CLIENT_ID
        sync: false         # set in dashboard
      - key: QBO_CLIENT_SECRET
        sync: false         # set in dashboard
      - key: QBO_REDIRECT_URI
        # Replace <service-name> with your actual Render URL after deploy.
        value: https://pclaw-qbo.onrender.com/oauth/callback
      - key: QBO_ENVIRONMENT
        value: sandbox
      - key: QBO_REAL_IMPORT
        value: "0"          # flip to "1" once you've smoke-tested the deploy
      - key: ENCRYPTION_KEY
        generateValue: true # Fernet-compatible 32-byte url-safe base64
      - key: SECRET_KEY
        generateValue: true
      - key: IMPORT_HISTORY_DB
        value: /var/data/import_history.sqlite3
      - key: APP_DB
        value: /var/data/app.sqlite3
      # Encrypted source CSVs and processed export CSVs must live on the
      # persistent disk too. Without these, uploads/ and processed/ inside
      # the project tree are wiped on every redeploy, which surfaces to
      # users as "the original upload for this job is no longer available"
      # mid-workflow.
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: OUTPUT_DIR
        value: /var/data/processed
      - key: APP_ENV
        value: production    # enables Secure cookies + requires SECRET_KEY
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Stripe Checkout. Set all four in the Render dashboard once the
      # Stripe products exist. The /pricing page degrades gracefully if
      # they are missing — see STRIPE_SETUP.md.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ESSENTIAL
        sync: false
      - key: STRIPE_PRICE_STANDARD
        sync: false
      - key: STRIPE_PRICE_COMPLETE
        sync: false
      # Calendly discovery-call lead capture. Set the signing key and API
      # token in the Render dashboard (never commit them). The API token
      # powers enrichment (meeting times + form answers) and the operator
      # "Sync recent Calendly bookings" backfill — see CALENDLY_SETUP.md.
      - key: CALENDLY_WEBHOOK_SIGNING_KEY
        sync: false
      - key: CALENDLY_API_TOKEN
        sync: false
    disk:
      name: pclaw-qbo-data
      mountPath: /var/data
      sizeGB: 1
